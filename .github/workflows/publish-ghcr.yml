name: Publish and Deploy Verity API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  IMAGE_NAME: ghcr.io/mustafaamin06/verity-api
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || '26298cf2-98c0-4b8c-9515-0676e80ff070' }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'verity-rg' }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'verity-api' }}

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      deploy_image: ${{ steps.image.outputs.deploy_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          TAGS="${IMAGE_NAME}:latest"
          TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:sha-${GITHUB_SHA}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_TAG="${GITHUB_REF_NAME}"
            TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:${VERSION_TAG}"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Select deploy image
        id: image
        run: echo "deploy_image=${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

  deploy-azure-containerapp:
    needs: publish-ghcr
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Verify Azure CLI session
        run: az account show

      - name: Ensure correct subscription
        run: az account set --subscription "${AZURE_SUBSCRIPTION_ID}"

      - name: Ensure containerapp extension is available
        run: az extension add --name containerapp --upgrade

      - name: Update Azure Container App image
        run: |
          az containerapp update \
            --subscription "${AZURE_SUBSCRIPTION_ID}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_CONTAINER_APP_NAME}" \
            --image "${{ needs.publish-ghcr.outputs.deploy_image }}"
