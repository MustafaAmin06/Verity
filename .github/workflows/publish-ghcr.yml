name: Publish Docker image to GHCR

  on:
    workflow_dispatch:
    push:
      branches: [ "main" ]

  jobs:
    push-to-ghcr:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Log in to GHCR
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build and push latest
          uses: docker/build-push-action@v6
          with:
            context: .
            push: true
            tags: |
              ghcr.io/mustafaamin06/verity-api:latest
              ghcr.io/mustafaamin06/verity-api:v1

