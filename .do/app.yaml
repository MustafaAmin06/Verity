name: verity-api
region: tor
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
services:
  - name: api
    github:
      repo: MustafaAmin06/Verity
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    source_dir: .
    http_port: 8001
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-2gb
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 6
      success_threshold: 1
    envs:
      - key: PORT
        value: "8001"
        scope: RUN_TIME
        type: GENERAL
      - key: GITHUB_MODEL
        value: gpt-4o-mini
        scope: RUN_TIME
        type: GENERAL
      - key: VERITY_STRICT_EXTENSION_LOCKDOWN
        value: "true"
        scope: RUN_TIME
        type: GENERAL
    # Add the following secrets in the App Platform UI before going live:
    # GITHUB_TOKEN
    # OPENALEX_EMAIL
    # VERITY_EXTENSION_ID
